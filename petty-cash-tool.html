<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小口現金集計ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#1c2733; --ink2:#52606d; --line:#dde3ea; --line2:#eef2f6;
    --bg:#f4f6f9; --panel:#ffffff; --accent:#0b6b5e; --accent-soft:#e3f1ee;
    --warn:#b4541a; --warn-soft:#fbeee2; --ok:#0b6b5e;
    --r8:#1d6fb8; --r10:#7a4fb0; --rx:#6b7682;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",-apple-system,sans-serif;
    font-size:14px; line-height:1.6;
  }
  header{
    background:var(--panel); border-bottom:1px solid var(--line);
    padding:14px 24px; position:sticky; top:0; z-index:50;
  }
  .header-bar{display:flex; align-items:center; gap:18px;}
  header h1{font-size:17px; margin:0; letter-spacing:.02em; font-weight:700;}
  header .sub{color:var(--ink2); font-size:12px;}
  .toggle-btn{
    margin-left:auto; border:1px solid var(--line); background:#fff; color:var(--accent);
    border-radius:8px; padding:7px 12px; font-size:12px; font-weight:700; font-family:inherit;
    cursor:pointer; display:flex; align-items:center; gap:6px; white-space:nowrap;
  }
  .toggle-btn:hover{background:var(--accent-soft);}
  #toggle-icon{font-size:10px; transition:transform .2s;}
  .topfields{display:flex; gap:14px; flex-wrap:wrap; align-items:flex-end; margin-top:12px; overflow:hidden;}
  header.collapsed .topfields{display:none;}
  header.collapsed{padding-bottom:12px;}
  .field{display:flex; flex-direction:column; gap:3px;}
  .field label{font-size:11px; color:var(--ink2); font-weight:600;}
  .field input{
    border:1px solid var(--line); border-radius:7px; padding:9px 10px;
    font-size:15px; font-family:inherit; background:#fff;
  }
  .field input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft);}
  main{max-width:1180px; margin:0 auto; padding:24px;}

  .card{background:var(--panel); border:1px solid var(--line); border-radius:12px; margin-bottom:20px; overflow:hidden;}
  .card-head{padding:14px 18px; border-bottom:1px solid var(--line2); display:flex; align-items:center; gap:10px;}
  .card-head h2{font-size:14px; margin:0; font-weight:700;}
  .card-head .hint{font-size:12px; color:var(--ink2); margin-left:auto;}
  .card-body{padding:18px;}

  /* レシート入力エリア */
  .receipt-meta{display:grid; grid-template-columns:130px 1fr 1.4fr; gap:12px; margin-bottom:14px;}
  .receipt-meta .field{flex:1;}
  .receipt-meta input{width:100%;}

  table.lines{width:100%; border-collapse:collapse; font-size:13px;}
  table.lines th{
    text-align:left; font-weight:600; color:var(--ink2); font-size:11px;
    padding:7px 8px; border-bottom:1px solid var(--line); white-space:nowrap;
  }
  table.lines td{padding:5px 6px; border-bottom:1px solid var(--line2); vertical-align:middle;}
  table.lines input, table.lines select{
    width:100%; border:1px solid var(--line); border-radius:6px; padding:6px 8px;
    font-size:13px; font-family:inherit; background:#fff;
  }
  table.lines .l-preset{margin-bottom:5px; background:var(--accent-soft); border-color:var(--accent); color:var(--accent); font-weight:600;}
  table.lines input:focus, table.lines select:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-soft);}
  td.amt input{text-align:right;}
  td.calc{text-align:right; color:var(--ink2); font-variant-numeric:tabular-nums; white-space:nowrap; font-size:12px;}
  .rate-8{color:var(--r8); font-weight:700;}
  .rate-10{color:var(--r10); font-weight:700;}
  .rate-x{color:var(--rx); font-weight:700;}

  .btn{
    border:1px solid var(--line); background:#fff; color:var(--ink);
    border-radius:8px; padding:8px 14px; font-size:13px; font-family:inherit;
    cursor:pointer; font-weight:600; transition:.12s;
  }
  .btn:hover{background:var(--line2);}
  .btn-primary{background:var(--accent); color:#fff; border-color:var(--accent);}
  .btn-primary:hover{background:#095649;}
  .btn-ghost{border-color:transparent; color:var(--accent); background:transparent;}
  .btn-ghost:hover{background:var(--accent-soft);}
  .btn-mini{padding:4px 9px; font-size:12px; border-radius:6px;}
  .btn-del{color:var(--warn); border-color:transparent; background:transparent; padding:4px 8px; cursor:pointer; font-size:16px; line-height:1;}
  .btn-del:hover{background:var(--warn-soft); border-radius:6px;}

  .receipt-actions{display:flex; gap:10px; margin-top:14px; align-items:center; flex-wrap:wrap;}
  .receipt-actions .spacer{flex:1;}

  /* 登録済み明細 */
  table.ledger{width:100%; border-collapse:collapse; font-size:13px;}
  table.ledger th{background:var(--bg); text-align:left; font-size:11px; color:var(--ink2); font-weight:600; padding:8px; border-bottom:1px solid var(--line); white-space:nowrap;}
  table.ledger td{padding:8px; border-bottom:1px solid var(--line2); vertical-align:top;}
  table.ledger td.num{text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap;}
  table.ledger tr:hover td{background:#fafcfd;}
  .pill{display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px;}
  .pill-8{background:#e7f1fa; color:var(--r8);}
  .pill-10{background:#f0eafa; color:var(--r10);}
  .pill-x{background:#eef1f4; color:var(--rx);}
  .memo-flag{color:var(--warn); font-size:11px; font-weight:700;}
  .empty{color:var(--ink2); text-align:center; padding:30px; font-size:13px;}

  /* 月計 */
  .summary-grid{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
  table.sum{width:100%; border-collapse:collapse; font-size:13px;}
  table.sum th{text-align:left; font-size:11px; color:var(--ink2); padding:6px 8px; border-bottom:1px solid var(--line);}
  table.sum td{padding:6px 8px; border-bottom:1px solid var(--line2);}
  table.sum td.num{text-align:right; font-variant-numeric:tabular-nums;}
  table.sum tr.total td{font-weight:800; border-top:2px solid var(--ink); background:var(--accent-soft);}
  .journal{font-size:13px; line-height:1.9; font-variant-numeric:tabular-nums;}
  .journal h3{font-size:12px; color:var(--ink2); margin:0 0 6px; border-bottom:1px solid var(--line2); padding-bottom:4px;}
  .journal .row{display:flex; justify-content:space-between; max-width:340px;}
  .journal .row span:last-child{font-weight:600;}
  .journal .jtotal{border-top:1px solid var(--line); margin-top:6px; padding-top:4px; font-weight:800;}

  /* チェック */
  .check-list{list-style:none; padding:0; margin:0; font-size:13px;}
  .check-list li{padding:5px 0; display:flex; align-items:center; gap:8px;}
  .badge{font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; white-space:nowrap;}
  .badge-ok{background:var(--accent-soft); color:var(--ok);}
  .badge-warn{background:var(--warn-soft); color:var(--warn);}
  .check-detail{color:var(--warn); font-size:12px; margin:4px 0 0 26px;}

  .export-bar{display:flex; gap:12px; align-items:center; flex-wrap:wrap;}
  .export-bar .fname{font-size:12px; color:var(--ink2); font-variant-numeric:tabular-nums;}

  datalist{display:none;}
  .footnote{font-size:11px; color:var(--ink2); margin-top:6px;}
</style>
</head>
<body>
<header>
  <div class="header-bar" id="header-bar">
    <div>
      <h1>小口現金 集計ツール</h1>
      <div class="sub" id="header-sub">税込金額＋税率を入れるだけ。月計・仕訳・Excelまで自動生成</div>
    </div>
    <button class="toggle-btn" id="toggle-header" aria-label="入力欄の開閉">
      <span id="toggle-label">基本情報を隠す</span>
      <span id="toggle-icon">▲</span>
    </button>
  </div>
  <div class="topfields" id="topfields">
    <div class="field">
      <label>該当年月</label>
      <input type="month" id="ym" />
    </div>
    <div class="field">
      <label>店舗名</label>
      <input type="text" id="store" placeholder="例：文蔵東心斎橋店" />
    </div>
    <div class="field">
      <label>支給金額 <span style="color:var(--warn)">必須</span></label>
      <input type="text" id="kyuyo" inputmode="numeric" placeholder="例：50000" />
    </div>
    <div class="field">
      <label>財布残金（実際の残高）<span style="color:var(--warn)">必須</span></label>
      <input type="text" id="zankin" inputmode="numeric" placeholder="例：12345" />
    </div>
    <div class="field">
      <label>立替金（任意・自腹で補った分）</label>
      <input type="text" id="tatekae" inputmode="numeric" placeholder="例：0" />
    </div>
  </div>
</header>

<main>
  <!-- レシート入力 -->
  <div class="card">
    <div class="card-head">
      <h2>① レシートを入力</h2>
      <span class="hint">1枚のレシートで税率が混在する時は「行を追加」で分けてください</span>
    </div>
    <div class="card-body">
      <div class="receipt-meta">
        <div class="field">
          <label>日付</label>
          <input type="date" id="r-date" />
        </div>
        <div class="field">
          <label>支払先 <span style="color:var(--warn)">必須</span></label>
          <input type="text" id="r-payee" list="payee-list" placeholder="例：新明サービス" />
        </div>
        <div class="field">
          <label>メモ（任意・要確認など）</label>
          <input type="text" id="r-memo" placeholder="" />
        </div>
      </div>

      <table class="lines">
        <thead>
          <tr>
            <th style="width:32%">利用内容</th>
            <th style="width:24%">勘定科目（自動提案・変更可）</th>
            <th style="width:13%">税込金額</th>
            <th style="width:11%">税率</th>
            <th style="width:18%">内訳（自動）</th>
            <th style="width:2%"></th>
          </tr>
        </thead>
        <tbody id="line-body"></tbody>
      </table>

      <div class="receipt-actions">
        <button class="btn btn-mini" id="add-line">＋ 行を追加（税率混在時）</button>
        <div class="spacer"></div>
        <button class="btn btn-ghost" id="clear-receipt">クリア</button>
        <button class="btn btn-primary" id="commit-receipt">このレシートを登録</button>
      </div>
      <div class="footnote">※ 税率「対象外」を選ぶと全額が対象外として計上されます（交通ICチャージなど）。</div>
    </div>
  </div>

  <!-- 登録済み明細 -->
  <div class="card">
    <div class="card-head">
      <h2>② 登録済みの明細</h2>
      <span class="hint" id="ledger-count">0 件</span>
    </div>
    <div class="card-body" style="padding:0;">
      <table class="ledger">
        <thead>
          <tr>
            <th>日付</th><th>支払先</th><th>利用内容</th><th>勘定科目</th>
            <th class="num">税抜8%</th><th class="num">消費税8%</th>
            <th class="num">税抜10%</th><th class="num">消費税10%</th>
            <th class="num">対象外</th><th class="num">税込合計</th>
            <th>メモ</th><th></th>
          </tr>
        </thead>
        <tbody id="ledger-body"></tbody>
      </table>
    </div>
  </div>

  <!-- 月計・仕訳 -->
  <div class="card">
    <div class="card-head"><h2>③ 月計と仕訳イメージ</h2></div>
    <div class="card-body">
      <div class="summary-grid">
        <div>
          <table class="sum">
            <thead><tr><th>区分</th><th class="num">税抜金額</th><th class="num">消費税</th><th class="num">対象外</th><th class="num">税込合計</th></tr></thead>
            <tbody id="sum-body"></tbody>
          </table>
        </div>
        <div class="journal" id="journal"></div>
      </div>
    </div>
  </div>

  <!-- チェック・出力 -->
  <div class="card">
    <div class="card-head"><h2>④ 添削チェックと Excel 出力</h2></div>
    <div class="card-body">
      <ul class="check-list" id="check-list"></ul>
      <div style="height:14px;"></div>
      <div class="export-bar">
        <button class="btn btn-primary" id="export-btn">Excelファイルをダウンロード（.xlsx）</button>
        <span class="fname" id="fname-preview"></span>
      </div>
    </div>
  </div>
</main>

<datalist id="payee-list"></datalist>

<script>
/* ===== 勘定科目 自動提案ルール ===== */
const RULES = [
  // [キーワード配列, 勘定科目, 推奨税率]  ※先に書いたものが優先（具体的なものほど上に）

  // --- ゴミ回収・清掃 ---
  [["新明サービス","新明"], "雑費10%・ゴミ回収代", "10"],

  [["電車","切符","乗車券","乗車","定期","jr","近鉄","阪急","阪神","京阪","南海","地下鉄","メトロ","モノレール","バス","タクシー","mkタクシー","駐車","コインパーキング","パーキング","times","タイムズ","高速","etc","料金所","ガソリン","エネオス","eneos","出光","コスモ","シェル","apollo","給油"], "旅費交通費10%", "10"],

  // --- 通信費・送料 ---
  [["切手","郵便","郵便局","ゆうゆうメルカリ","レターパック","スマートレター","はがき","ハガキ","封筒","定形","ゆうパック","ゆうメール","電話","携帯","通信","ネット回線","wi-fi","wifi"], "通信費10%", "10"],
  [["宅配","宅急便","ヤマト","クロネコ","佐川","飛脚","西濃","送料","運送","配送","チャーター便"], "荷造運賃10%", "10"],

  // --- 消耗品（清掃・衛生） ---
  [["洗剤","食器用洗剤","漂白","ハイター","除菌","消毒","アルコール","エタノール","ハンドソープ","石鹸","せっけん","清掃","掃除","スポンジ","たわし","ブラシ","モップ","雑巾","ぞうきん","ゴミ袋","ごみ袋","ポリ袋","トイレットペーパー","ティッシュ","ペーパータオル","キッチンペーパー","衛生","マスク","手袋","ゴム手袋","ニトリル"], "消耗品10%", "10"],

  // --- 消耗品（備品・事務・キッチン用品） ---
  [["ラップ","サランラップ","アルミ","ホイル","クッキングシート","紙コップ","紙皿","紙容器","テイクアウト容器","容器","パック","おしぼり","爪楊枝","つまようじ","割り箸","割りばし","箸","ストロー","スプーン","フォーク","レジ袋","手提げ袋","袋","文具","文房具","ペン","ボールペン","マジック","ノート","ファイル","クリップ","ホチキス","のり","テープ","ガムテープ","セロテープ","コピー用紙","印刷用紙","用紙","インク","トナー","電池","乾電池","乾電池","ラベル","シール","付箋","包丁","まな板","ボウル","ざる","鍋","フライパン","食器","皿","グラス","おたま","菜箸","計量","ふきん","100均","ダイソー","セリア","キャンドゥ","ニトリ","カインズ","コーナン","コメリ","ホームセンター"], "消耗品10%", "10"],

  // --- 仕入（食材・飲食店材料、軽減8%） ---
  [["青果","八百屋","精肉","鮮魚","肉","牛","豚","鶏","魚","刺身","野菜","果物","くだもの","米","コメ","食材","食品","業務スーパー","業務用","スーパー","市場","卸","問屋","乳","牛乳","生クリーム","チーズ","バター","卵","たまご","タマゴ","玉子","小麦","小麦粉","パン粉","砂糖","塩","醤油","しょうゆ","味噌","みそ","だし","出汁","油","オイル","酢","調味料","ソース","ケチャップ","マヨネーズ","スパイス","香辛料","コーヒー豆","茶葉","製菓","パン","麺","乾物","冷凍食品","コストコ","角上","ハナマサ","aコープ","jマート"], "仕入8%", "8"],
  // 酒の店頭購入（軽減対象外＝10%になる場合あり。手で直せるよう一旦8%提案）

  // --- 接待交際費 ---
  [["手土産","差し入れ","接待","贈答","お礼","菓子折り","ギフト","お祝い","香典","祝儀","花","生花","胡蝶蘭"], "接待交際費10%", "10"],

  // --- 福利厚生費（まかない・スタッフ飲料軽食） ---

  // --- 支払手数料 ---

  // --- 租税公課（収入印紙など・対象外） ---
  [["収入印紙","印紙","証紙","租税","登記印紙"], "租税公課・対象外", "x"],

  // --- 現金書留 ---

  // --- クリーニング ---

  // --- 酒類（店頭購入は軽減対象外＝10%）。仕入の食材より前に置く ---

];

// 業態名などからのフォールバック（弱い一致）
const SOFT_RULES = [
  [["薬局","ドラッグ","マツモトキヨシ","マツキヨ","ウエルシア","スギ薬局","サンドラッグ","ココカラ","コスモス"], "消耗品10%", "10"],
  [["コンビニ","セブン","ローソン","ファミマ","ファミリーマート","デイリー","ミニストップ"], "消耗品10%", "10"],
  [["ホームセンター","電器","ヤマダ","ビック","ヨドバシ","ケーズ","エディオン"], "消耗品10%", "10"],
];

// よく使う利用内容（選択式）　[表示ラベル, 勘定科目, 税率]
const CONTENT_PRESETS = [
  ["食材（野菜・肉・魚など）", "仕入8%", "8"],
  ["飲料・ソフトドリンク（仕入8%）", "仕入8%", "8"],
  ["酒類（ビール・日本酒など 仕入10%）", "仕入10%", "10"],
  ["調味料・油・粉類", "仕入8%", "8"],
  ["洗剤・除菌・消毒", "消耗品10%", "10"],
  ["トイレットペーパー・衛生用品", "消耗品10%", "10"],
  ["ラップ・容器・割り箸・紙コップ", "消耗品10%", "10"],
  ["文具・事務用品・コピー用紙", "消耗品10%", "10"],
  ["キッチン用品・備品", "消耗品10%", "10"],
  ["クリーニング代", "消耗品10%", "10"],
  ["ゴミ回収（新明サービス）", "雑費10%・ゴミ回収代", "10"],

const ACCOUNTS = [
  "仕入8%","仕入10%","消耗品10%","雑費10%・ゴミ回収代","旅費交通費10%","旅費交通費・対象外",
  "通信費10%","荷造運賃10%","接待交際費8%","接待交際費10%","福利厚生費8%","福利厚生費10%",
  "水道光熱費10%","支払手数料10%","租税公課・対象外","その他／要確認"
];

// 区分（月計の並び順）
const CATEGORY_ORDER = [
  "仕入8%","仕入10%","消耗品10%","雑費10%・ゴミ回収代","旅費交通費10%","旅費交通費・対象外",
  "通信費10%","荷造運賃10%","接待交際費8%","接待交際費10%","福利厚生費8%","福利厚生費10%",
  "水道光熱費10%","支払手数料10%","租税公課・対象外","その他／要確認"
];

function suggestAccount(text){
  const t = (text||"").toLowerCase();
  if(!t.trim()) return null;
  for(const [keys,acc,rate] of RULES){
    for(const k of keys){
      if(t.includes(k.toLowerCase())) return {acc, rate};
    }
  }
  for(const [keys,acc,rate] of SOFT_RULES){
    for(const k of keys){
      if(t.includes(k.toLowerCase())) return {acc, rate};
    }
  }
  return null;
}

/* 税込→税抜・消費税 逆算 */
function breakdown(gross, rate){
  gross = Math.round(Number(gross)||0);
  if(rate==="x" || !gross) return {n8:0,t8:0,n10:0,t10:0,gai: rate==="x"?gross:0, gross};
  if(rate==="8"){
    const net = Math.round(gross/1.08);
    return {n8:net, t8:gross-net, n10:0, t10:0, gai:0, gross};
  }
  if(rate==="10"){
    const net = Math.round(gross/1.10);
    return {n8:0,t8:0, n10:net, t10:gross-net, gai:0, gross};
  }
  return {n8:0,t8:0,n10:0,t10:0,gai:0,gross};
}

const fmt = n => (Math.round(n)||0).toLocaleString("ja-JP");

/* ===== レシート入力欄の行 ===== */
function newLineRow(){
  const tr = document.createElement("tr");
  tr.dataset.id = ++lineSeq;
  tr.innerHTML = `
    <td>
      <select class="l-preset">
        <option value="">― よく使う項目から選ぶ ―</option>
        ${CONTENT_PRESETS.map((p,i)=>`<option value="${i}">${p[0]}</option>`).join("")}
      </select>
      <input type="text" class="l-content" placeholder="自由入力も可（例：鶏もも肉）">
    </td>
    <td><select class="l-account">${ACCOUNTS.map(a=>`<option>${a}</option>`).join("")}</select></td>
    <td class="amt"><input type="text" class="l-gross" inputmode="numeric" placeholder="税込"></td>
    <td><select class="l-rate"><option value="8">8%</option><option value="10" selected>10%</option><option value="x">対象外</option></select></td>
    <td class="calc l-calc">—</td>
    <td><button class="btn-del" title="行を削除">×</button></td>
  `;
  const preset = tr.querySelector(".l-preset");
  const content = tr.querySelector(".l-content");
  const account = tr.querySelector(".l-account");
  const gross = tr.querySelector(".l-gross");
  const rate = tr.querySelector(".l-rate");
  const calc = tr.querySelector(".l-calc");
  let accountTouched = false;

  function recalc(){
    const b = breakdown(gross.value, rate.value);
    if(!b.gross){ calc.textContent="—"; return; }
    if(rate.value==="x") calc.innerHTML = `対象外 <span class="rate-x">¥${fmt(b.gross)}</span>`;
    else if(rate.value==="8") calc.innerHTML = `税抜 ${fmt(b.n8)} ／ 税8% <span class="rate-8">${fmt(b.t8)}</span>`;
    else calc.innerHTML = `税抜 ${fmt(b.n10)} ／ 税10% <span class="rate-10">${fmt(b.t10)}</span>`;
  }
  function autoSuggest(){
    if(accountTouched) return;
    const payee = document.getElementById("r-payee").value;
    const s = suggestAccount(content.value) || suggestAccount(payee);
    if(s){
      account.value = s.acc;
      rate.value = s.rate;
      recalc();
    }
  }
  // プリセット選択 → 利用内容に反映し、科目・税率を自動セット
  preset.addEventListener("change", ()=>{
    const idx = preset.value;
    if(idx==="") return;
    const [label, acc, r] = CONTENT_PRESETS[Number(idx)];
    content.value = label;
    account.value = acc;
    rate.value = r;
    accountTouched = false; // プリセット選択は確定提案として扱う
    recalc();
    preset.selectedIndex = 0; // 選択後はラベルを初期に戻す（連続選択しやすく）
  });
  content.addEventListener("input", autoSuggest);
  tr._autoSuggest = autoSuggest;
  account.addEventListener("change", ()=>{ accountTouched=true; });
  gross.addEventListener("input", recalc);
  rate.addEventListener("change", recalc);
  tr.querySelector(".btn-del").addEventListener("click", ()=>{
    if(document.querySelectorAll("#line-body tr").length>1) tr.remove();
  });
  return tr;
}

    });

/* ===== 月計の計算 ===== */
function computeSummary(){
  const map={};
  CATEGORY_ORDER.forEach(c=>map[c]={net:0,tax:0,gai:0,gross:0});
  entries.forEach(e=>{
    if(!map[e.account]) map[e.account]={net:0,tax:0,gai:0,gross:0};
    map[e.account].net += e.n8+e.n10;
    map[e.account].tax += e.t8+e.t10;
    map[e.account].gai += e.gai;
    map[e.account].gross += e.gross;
  });
  return map;
}

function renderSummary(){
  const map=computeSummary();
  const tb=document.getElementById("sum-body");
  tb.innerHTML="";
  let tn=0,tt=0,tg=0,tgr=0;
  CATEGORY_ORDER.forEach(c=>{
    const m=map[c]; if(!m||m.gross===0) return;
    tn+=m.net; tt+=m.tax; tg+=m.gai; tgr+=m.gross;
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${c}</td><td class="num">${m.net?fmt(m.net):"-"}</td><td class="num">${m.tax?fmt(m.tax):"-"}</td><td class="num">${m.gai?fmt(m.gai):"-"}</td><td class="num">${fmt(m.gross)}</td>`;
    tb.appendChild(tr);
  });
  // 未定義科目（ルール外）も拾う
  Object.keys(map).forEach(c=>{
    if(CATEGORY_ORDER.includes(c)) return;
    const m=map[c]; if(m.gross===0) return;
    tn+=m.net; tt+=m.tax; tg+=m.gai; tgr+=m.gross;
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${c}</td><td class="num">${fmt(m.net)}</td><td class="num">${fmt(m.tax)}</td><td class="num">${fmt(m.gai)}</td><td class="num">${fmt(m.gross)}</td>`;
    tb.appendChild(tr);
  });
  const tr=document.createElement("tr");
  tr.className="total";
  tr.innerHTML=`<td>総合計</td><td class="num">${fmt(tn)}</td><td class="num">${fmt(tt)}</td><td class="num">${fmt(tg)}</td><td class="num">${fmt(tgr)}</td>`;
  tb.appendChild(tr);
  return {map, tn,tt,tg,tgr};
}

/* ===== 仕訳イメージ ===== */
function renderJournal(s){
  const j=document.getElementById("journal");
  const map=s.map;
  // 借方を組み立て
  const debit=[];
  const push=(label,val)=>{ if(val>0) debit.push([label,val]); };
  // 8%系
  push("仕入高 軽減8%", (map["仕入8%"]?.net)||0);
  push("仮払消費税8%（仕入）", (map["仕入8%"]?.tax)||0);
  push("接待交際費8%", (map["接待交際費8%"]?.net)||0);
  push("仮払消費税8%（接待）", (map["接待交際費8%"]?.tax)||0);
  push("福利厚生費8%", (map["福利厚生費8%"]?.net)||0);
  push("仮払消費税8%（福利）", (map["福利厚生費8%"]?.tax)||0);
  // 10%系（税抜）
  const tenList=[
    ["仕入高10%","仕入10%"],["消耗品費10%","消耗品10%"],["雑費10%（ゴミ回収）","雑費10%・ゴミ回収代"],
    ["旅費交通費10%","旅費交通費10%"],["通信費10%","通信費10%"],["荷造運賃10%","荷造運賃10%"],
    ["接待交際費10%","接待交際費10%"],["福利厚生費10%","福利厚生費10%"],["水道光熱費10%","水道光熱費10%"],
    ["支払手数料10%","支払手数料10%"]
  ];
  let tax10=0;
  tenList.forEach(([label,key])=>{
    const m=map[key]; if(m&&m.net>0){ push(label, m.net); tax10+=m.tax; }
  });
  push("仮払消費税10%", tax10);
  // 対象外
  push("旅費交通費 対象外", (map["旅費交通費・対象外"]?.gai)||0);
  push("租税公課（印紙等）対象外", (map["租税公課・対象外"]?.gai)||0);
  // その他
  const other=map["その他／要確認"];
  if(other&&other.gross>0) push("その他／要確認", other.gross);

  const debitTotal=debit.reduce((a,[,v])=>a+v,0);
  let html=`<h3>仕訳イメージ</h3>`;
  html+=`<div><strong>借方</strong></div>`;
  if(debit.length===0) html+=`<div class="row"><span>（明細なし）</span><span></span></div>`;
  debit.forEach(([l,v])=>{ html+=`<div class="row"><span>${l}</span><span>${fmt(v)} 円</span></div>`; });
  html+=`<div class="row jtotal"><span>借方合計</span><span>${fmt(debitTotal)} 円</span></div>`;
  html+=`<div style="height:10px;"></div><div><strong>貸方</strong></div>`;
  html+=`<div class="row"><span>小口現金</span><span>${fmt(s.tgr)} 円</span></div>`;
  html+=`<div class="row jtotal"><span>貸方合計</span><span>${fmt(s.tgr)} 円</span></div>`;
  j.innerHTML=html;
  return {debitTotal, debit};
}

/* ===== チェック ===== */
function renderChecks(s, jr){
  const ul=document.getElementById("check-list");
  const checks=[];
  // 明細税込合計＝月計総合計
  const ledgerGross=entries.reduce((a,e)=>a+e.gross,0);
  checks.push(["明細合計と月計合計", ledgerGross===s.tgr, `明細 ${fmt(ledgerGross)} / 月計 ${fmt(s.tgr)}`]);
  // 借方＝貸方
  checks.push(["借方合計と貸方合計", jr.debitTotal===s.tgr, `借方 ${fmt(jr.debitTotal)} / 貸方 ${fmt(s.tgr)}`]);
  // 各行 税抜+税+対象外=税込
  let rowOk=true;
  entries.forEach(e=>{ if(e.n8+e.t8+e.n10+e.t10+e.gai!==e.gross) rowOk=false; });
  checks.push(["各行の税抜＋消費税＋対象外＝税込", rowOk, ""]);
  // 日付未入力
  const noDate=entries.filter(e=>!e.date).length;
  checks.push(["日付の入力", noDate===0, noDate? `${noDate} 件で日付が未入力` : ""]);
  // 要確認メモ
  const needCheck=entries.filter(e=>/要確認|推定|未入力/.test(e.memo)||e.account==="その他／要確認");
  checks.push(["要確認項目", needCheck.length===0, needCheck.length? `${needCheck.length} 件あり`:""]);
  // 重複（同日・同支払先・同額）
  const seen={}; let dup=0;
  entries.forEach(e=>{ const k=`${e.date}|${e.payee}|${e.gross}|${e.content}`; if(seen[k])dup++; seen[k]=1; });
  checks.push(["重複入力チェック", dup===0, dup? `${dup} 件の重複の可能性`:""]);

  // 現金照合（必須）　支出 ＋ 残金 ＝ 支給 ＋ 立替
  const kyuyo=Math.round(Number(document.getElementById("kyuyo").value)||0);
  const zankin=Math.round(Number(document.getElementById("zankin").value)||0);
  const tatekae=Math.round(Number(document.getElementById("tatekae").value)||0);
  const kyuyoFilled=document.getElementById("kyuyo").value.trim()!=="";
  const zankinFilled=document.getElementById("zankin").value.trim()!=="";
  if(!kyuyoFilled || !zankinFilled){
    checks.push(["現金照合（支給金額・財布残金）", false, "支給金額と財布残金の両方を入力してください"]);
  } else {
    const left = s.tgr + zankin;          // 支出 ＋ 残金
    const right = kyuyo + tatekae;         // 支給 ＋ 立替
    const match = left === right;
    const diff = right - left;
    const tatekaeTxt = tatekae>0 ? ` ＋ 立替 ${fmt(tatekae)}` : "";
    const detail = match
      ? `支出 ${fmt(s.tgr)} ＋ 残金 ${fmt(zankin)} = 支給 ${fmt(kyuyo)}${tatekaeTxt}（一致）`
      : `支出 ${fmt(s.tgr)} ＋ 残金 ${fmt(zankin)} = ${fmt(left)} ／ 支給 ${fmt(kyuyo)}${tatekaeTxt} = ${fmt(right)} → 差額 ${fmt(diff)} 円`;
    checks.push(["現金照合（支出＋残金＝支給＋立替）", match, detail]);
  }

  ul.innerHTML="";
  checks.forEach(([label,ok,detail,kind])=>{
    const li=document.createElement("li");
    const badge = kind==="info" ? `<span class="badge badge-ok">確認</span>` : (ok? `<span class="badge badge-ok">一致／OK</span>`:`<span class="badge badge-warn">要確認</span>`);
    li.innerHTML=`${badge}<span>${label}</span>`;
    if(detail) li.innerHTML+=`<span style="color:var(--ink2);font-size:12px;">— ${detail}</span>`;
    ul.appendChild(li);
  });
}

  // --- 明細シート ---
  const head=["日付","支払先","簡単な利用内容","勘定科目","税抜8%","消費税8%","税抜10%","消費税10%","対象外","税込合計","メモ"];
  const detail=[head];
  entries.forEach(e=>{
    detail.push([e.date, e.payee, e.content, e.account,
      e.n8||"", e.t8||"", e.n10||"", e.t10||"", e.gai||"", e.gross, e.memo||""]);
  });
  // 合計行
  const sum=(k)=>entries.reduce((a,e)=>a+(e[k]||0),0);
  detail.push(["","","","合計", sum("n8"),sum("t8"),sum("n10"),sum("t10"),sum("gai"),sum("gross"),""]);
  const ws1=XLSX.utils.aoa_to_sheet(detail);
  ws1["!cols"]=[{wch:11},{wch:18},{wch:24},{wch:18},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:12},{wch:20}];
  ws1["!freeze"]={xSplit:0,ySplit:1};
  ws1["!autofilter"]={ref:`A1:K${detail.length}`};
  // カンマ書式
  applyNumFmt(ws1, detail.length, [4,5,6,7,8,9]);
  XLSX.utils.book_append_sheet(wb, ws1, "明細");

  // --- 月計シート ---
  const map=computeSummary();
  const sumRows=[["区分","税抜金額","消費税","対象外","税込合計"]];
  let tn=0,tt=0,tg=0,tgr=0;
  CATEGORY_ORDER.concat(Object.keys(map).filter(k=>!CATEGORY_ORDER.includes(k))).forEach(c=>{
    const m=map[c]; if(!m||m.gross===0) return;
    tn+=m.net;tt+=m.tax;tg+=m.gai;tgr+=m.gross;
    sumRows.push([c, m.net||"", m.tax||"", m.gai||"", m.gross]);
  });
  sumRows.push(["総合計", tn, tt, tg, tgr]);
  sumRows.push([]);
  // 仕訳イメージ
  sumRows.push(["【仕訳イメージ】"]);
  sumRows.push(["借方"]);
  const debit=buildDebit(map);
  debit.forEach(([l,v])=>sumRows.push([l, v]));
  const debitTotal=debit.reduce((a,[,v])=>a+v,0);
  sumRows.push(["借方合計", debitTotal]);
  sumRows.push(["貸方"]);
  sumRows.push(["小口現金", tgr]);
  sumRows.push(["貸方合計", tgr]);
  sumRows.push([]);
  const kyuyo=Math.round(Number(document.getElementById("kyuyo").value)||0);
  const zankin=Math.round(Number(document.getElementById("zankin").value)||0);
  const tatekae=Math.round(Number(document.getElementById("tatekae").value)||0);
  sumRows.push(["【収支サマリー】"]);
  sumRows.push(["支給金額", kyuyo]);
  sumRows.push(["立替金", tatekae]);
  sumRows.push(["支出合計", tgr]);
  sumRows.push(["財布残金（実際）", zankin]);
  sumRows.push(["差額（支給＋立替−支出−残金）", (kyuyo+tatekae) - tgr - zankin]);
  const ws2=XLSX.utils.aoa_to_sheet(sumRows);
  ws2["!cols"]=[{wch:22},{wch:14},{wch:12},{wch:12},{wch:14}];
  applyNumFmt(ws2, sumRows.length, [1,2,3,4]);
  XLSX.utils.book_append_sheet(wb, ws2, "月計");

  // --- 勘定科目リスト ---
  const accRows=[["勘定科目"]].concat([
    "仕入8%","仕入10%","消耗品10%","雑費10%・ゴミ回収代","旅費交通費10%","旅費交通費・対象外",
    "通信費10%","荷造運賃10%","接待交際費8%","接待交際費10%","福利厚生費8%","福利厚生費10%",
    "水道光熱費10%","支払手数料10%","租税公課・対象外","その他／要確認"
  ].map(a=>[a]));
  const ws3=XLSX.utils.aoa_to_sheet(accRows);
  ws3["!cols"]=[{wch:22}];
  XLSX.utils.book_append_sheet(wb, ws3, "勘定科目リスト");

  XLSX.writeFile(wb, buildFileName());
});

function buildDebit(map){
  const debit=[];
  const push=(l,v)=>{ if(v>0) debit.push([l,v]); };
  push("仕入高 軽減8%", map["仕入8%"]?.net||0);
  push("仮払消費税8%（仕入）", map["仕入8%"]?.tax||0);
  push("接待交際費8%", map["接待交際費8%"]?.net||0);
  push("仮払消費税8%（接待）", map["接待交際費8%"]?.tax||0);
  push("福利厚生費8%", map["福利厚生費8%"]?.net||0);
  push("仮払消費税8%（福利）", map["福利厚生費8%"]?.tax||0);
  const tenList=[["仕入高10%","仕入10%"],["消耗品費10%","消耗品10%"],["雑費10%（ゴミ回収）","雑費10%・ゴミ回収代"],["旅費交通費10%","旅費交通費10%"],["通信費10%","通信費10%"],["荷造運賃10%","荷造運賃10%"],["接待交際費10%","接待交際費10%"],["福利厚生費10%","福利厚生費10%"],["水道光熱費10%","水道光熱費10%"],["支払手数料10%","支払手数料10%"]];
  let tax10=0;
  tenList.forEach(([l,k])=>{ const m=map[k]; if(m&&m.net>0){ push(l,m.net); tax10+=m.tax; } });
  push("仮払消費税10%", tax10);
  push("旅費交通費 対象外", map["旅費交通費・対象外"]?.gai||0);
  push("租税公課（印紙等）対象外", map["租税公課・対象外"]?.gai||0);
  const o=map["その他／要確認"]; if(o&&o.gross>0) push("その他／要確認", o.gross);
  return debit;
}

function applyNumFmt(ws, rowCount, cols){
  for(let r=1;r<rowCount;r++){
    cols.forEach(c=>{
      const addr=XLSX.utils.encode_cell({r, c});
      const cell=ws[addr];
      if(cell && typeof cell.v==="number") cell.z="#,##0";
    });
  }
}

function updateHeaderSummary(){
  const header=document.querySelector("header");
  const sub=document.getElementById("header-sub");
  if(header.classList.contains("collapsed")){
    const store=document.getElementById("store").value.trim()||"店舗未設定";
    const kyuyo=document.getElementById("kyuyo").value.trim();
    const zankin=document.getElementById("zankin").value.trim();
    const parts=[store];
    if(kyuyo) parts.push(`支給 ${Number(kyuyo).toLocaleString("ja-JP")}`);
    if(zankin) parts.push(`残金 ${Number(zankin).toLocaleString("ja-JP")}`);
    sub.textContent=parts.join(" ／ ");
  } else {
    sub.textContent="税込金額＋税率を入れるだけ。月計・仕訳・Excelまで自動生成";
  }
}
document.getElementById("toggle-header").addEventListener("click", ()=>{
  const header=document.querySelector("header");
  const collapsed=header.classList.toggle("collapsed");
  document.getElementById("toggle-label").textContent = collapsed? "基本情報を表示" : "基本情報を隠す";
  document.getElementById("toggle-icon").textContent = collapsed? "▼" : "▲";
  updateHeaderSummary();
});

  const now=new Date();
  document.getElementById("ym").value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  document.getElementById("line-body").appendChild(newLineRow());
  renderAll();
})();
